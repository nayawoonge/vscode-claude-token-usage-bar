name: Release

# Build the .vsix and attach it to a GitHub Release when you push a tag like v0.0.1
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Package extension
        run: vsce package

      - name: Attach .vsix to the release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.vsix"

      # Optional: publish to the VS Code Marketplace.
      # Add a repo secret VSCE_PAT, then uncomment.
      # - name: Publish to Marketplace
      #   run: vsce publish -p ${{ secrets.VSCE_PAT }}

      # Optional: publish to Open VSX (for VSCodium/Cursor/etc).
      # Add a repo secret OVSX_PAT, then uncomment.
      # - name: Publish to Open VSX
      #   run: npx ovsx publish *.vsix -p ${{ secrets.OVSX_PAT }}
