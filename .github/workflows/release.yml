name: Release

# Build the .vsix and attach it to a GitHub Release when you push a tag like v0.0.1
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    # Job-level env so the `if` conditions below can actually see these values.
    env:
      VSCE_PAT: ${{ secrets.VSCE_PAT }}
      OVSX_PAT: ${{ secrets.OVSX_PAT }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Package extension
        run: vsce package

      - name: Attach .vsix to the release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.vsix"

      # Publishes to the VS Code Marketplace only if a VSCE_PAT repo secret exists.
      - name: Publish to Marketplace
        if: ${{ env.VSCE_PAT != '' }}
        run: vsce publish -p "$VSCE_PAT"

      # Publishes to Open VSX (VSCodium/Cursor/…) only if an OVSX_PAT secret exists.
      - name: Publish to Open VSX
        if: ${{ env.OVSX_PAT != '' }}
        run: npx ovsx publish *.vsix -p "$OVSX_PAT"
